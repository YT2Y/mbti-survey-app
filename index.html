<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんなのMBTIマップ</title>
  <meta name="referrer" content="no-referrer">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <header class="header">
    <h1>みんなのMBTIマップ</h1>
    <p class="header-sub">あなたのMBTIと住んでる場所をおしえてね</p>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="survey">回答する</button>
    <button class="tab" data-tab="results">結果をみる</button>
  </nav>

  <!-- ========== 回答タブ ========== -->
  <section id="tab-survey" class="tab-content active">
    <div class="card">
      <h2>あなたについて教えて</h2>

      <div class="form-group">
        <label for="prefecture-select">住んでるところ</label>
        <select id="prefecture-select">
          <option value="">-- 選択してください --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="age-select">年齢</label>
        <select id="age-select">
          <option value="">-- 選択してください --</option>
          <option value="~19">19歳以下</option>
          <option value="20-29">20代</option>
          <option value="30-39">30代</option>
          <option value="40-49">40代</option>
          <option value="50-59">50代</option>
          <option value="60~">60歳以上</option>
        </select>
      </div>

      <div class="form-group">
        <label>性別</label>
        <div class="gender-group" id="gender-group">
          <label class="radio-label"><input type="radio" name="gender" value="male"> 男性</label>
          <label class="radio-label"><input type="radio" name="gender" value="female"> 女性</label>
          <label class="radio-label"><input type="radio" name="gender" value="other"> その他</label>
          <label class="radio-label"><input type="radio" name="gender" value="no-answer"> 回答しない</label>
        </div>
      </div>

      <div class="form-group">
        <label>あなたのMBTIタイプ</label>
        <div class="mbti-grid" id="mbti-grid"></div>
      </div>

      <button id="submit-btn" class="btn-primary" disabled>送信する</button>
      <div id="submit-message" class="message hidden"></div>
    </div>
  </section>

  <!-- ========== 結果タブ ========== -->
  <section id="tab-results" class="tab-content hidden">
    <div class="card">
      <h2>みんなのMBTIマップ</h2>
      <div class="map-legend" id="map-legend"></div>
      <div class="map-container" id="map-container"></div>
      <div class="tooltip" id="map-tooltip"></div>
    </div>

    <div class="card">
      <h2>みんなのMBTI分布</h2>
      <div class="chart-wrapper">
        <canvas id="chart-overall"></canvas>
      </div>
    </div>

    <div class="charts-row">
      <div class="card">
        <h2>気質グループ分布</h2>
        <div class="chart-wrapper chart-small">
          <canvas id="chart-groups"></canvas>
        </div>
      </div>
      <div class="card">
        <h2>都道府県別分布</h2>
        <div class="form-group">
          <select id="pref-chart-select">
            <option value="">-- 都道府県を選択 --</option>
          </select>
        </div>
        <div class="chart-wrapper chart-small">
          <canvas id="chart-prefecture"></canvas>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>集計テーブル</h2>
      <div class="table-controls">
        <label><input type="checkbox" id="show-zero-rows"> 回答0件の都道府県も表示</label>
      </div>
      <div class="table-wrapper">
        <table id="results-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ========== データ管理タブ ========== -->
  <section id="tab-manage" class="tab-content hidden">
    <div class="card">
      <h2>データ管理</h2>
      <p id="data-count">総回答数: 0件</p>

      <div class="manage-actions">
        <button id="btn-sample" class="btn-secondary">サンプルデータ追加（50件）</button>
        <button id="btn-export" class="btn-secondary">JSONエクスポート</button>
        <label class="btn-secondary btn-file">
          JSONインポート
          <input type="file" id="file-import" accept=".json" hidden>
        </label>
        <button id="btn-clear" class="btn-danger">全データ削除</button>
      </div>
    </div>
  </section>

  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
